<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Management Portal — Empire Roleplay</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800;900&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/style.css?v=2026-07-24-8">
</head>
<body data-page="login">

<div class="sky" aria-hidden="true">
  <div class="grid-fade"></div>
  <div class="beam"></div>
</div>

<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffdf8e"/><stop offset="1" stop-color="#c98a2e"/>
    </linearGradient>
    <symbol id="crown" viewBox="0 0 64 64">
      <path d="M8 44 L12 20 L22 32 L32 14 L42 32 L52 20 L56 44 Z" fill="url(#g)" stroke="#7a5518" stroke-width="1.5"/>
      <rect x="8" y="46" width="48" height="7" rx="2" fill="url(#g)" stroke="#7a5518" stroke-width="1.5"/>
      <circle cx="12" cy="18" r="3" fill="#ffdf8e"/><circle cx="32" cy="12" r="3" fill="#ffdf8e"/><circle cx="52" cy="18" r="3" fill="#ffdf8e"/>
      <circle cx="20" cy="49.5" r="1.8" fill="#9e1f3c"/><circle cx="32" cy="49.5" r="1.8" fill="#9e1f3c"/><circle cx="44" cy="49.5" r="1.8" fill="#9e1f3c"/>
    </symbol>
  </defs>
</svg>

<!-- ==================== LOGIN ==================== -->
<main class="screen active" id="scr-login">
  <div class="crest">
    <span class="corner tl"></span><span class="corner tr"></span>
    <span class="corner bl"></span><span class="corner br"></span>
    <svg aria-label="Empire crown crest"><use href="#crown"/></svg>
  </div>
  <h1>Empire Roleplay</h1>
  <div class="sub">Management Portal</div>

  <form class="gate" id="gateForm">
    <input type="text" id="loginUser" placeholder="Username" autocomplete="username" aria-label="Username">
    <input type="password" id="loginPw" placeholder="Password" autocomplete="current-password" aria-label="Password">
    <div class="err" id="loginErr"></div>
    <button type="submit" class="btn">Enter</button>
    <div class="hint">Staff access only</div>
  </form>
</main>

<!-- ==================== DASHBOARD ==================== -->
<main class="screen" id="scr-dash">
  <div class="crest small">
    <span class="corner tl"></span><span class="corner tr"></span>
    <span class="corner bl"></span><span class="corner br"></span>
    <svg aria-hidden="true"><use href="#crown"/></svg>
  </div>
  <h1>Empire Roleplay</h1>
  <div class="sub">Management Portal</div>
  <div class="signed">Signed in as <b id="whoami"></b></div>

  <div class="cards" id="dashCards"></div>

  <button class="back" onclick="logout()">← Lock portal</button>
</main>

<script src="assets/app.js?v=2026-07-24-8"></script>
</body>
</html>
